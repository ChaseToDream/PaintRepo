<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传作品 - 画仓</title>
    <meta name="description" content="上传 AI 绘图作品 · ComfyUI 工作流">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 密码验证遮罩 -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h2>管理员验证</h2>
            <div class="form-group">
                <label class="form-label">请输入管理密码</label>
                <input
                    type="password"
                    id="password-input"
                    class="form-input"
                    placeholder="输入密码..."
                    onkeypress="if(event.key === 'Enter') UploadPage.verifyPassword()"
                >
                <p id="auth-error" class="auth-error">密码错误，请重试</p>
            </div>
            <button onclick="UploadPage.verifyPassword()" class="btn btn-primary w-full">
                验证
            </button>
            <div class="auth-links">
                <a href="index.html">返回首页</a>
            </div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>画仓</span>
            </a>
            <div class="navbar-actions">
                <a href="index.html" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    <span>返回</span>
                </a>
                <button id="theme-toggle" class="theme-toggle" title="切换主题">
                    <span id="theme-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 上传表单 -->
    <main id="upload-form" class="upload-container" style="display: none;">
        <div class="upload-header">
            <h1>上传作品</h1>
            <p>上传您的 AI 绘图作品，记录 ComfyUI 工作流参数</p>
        </div>

        <form id="upload-form-element">
            <!-- 图片上传区域 -->
            <div class="form-group">
                <label class="form-label">图片文件 *</label>
                <div id="upload-area" class="upload-area">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>点击或拖拽图片到此处上传</p>
                    <p class="hint">支持 PNG、JPG、WebP 格式</p>
                </div>
                <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" style="display: none;" required>
                <div id="file-preview" class="file-preview"></div>
                <p id="file-name" class="file-name"></p>
            </div>

            <!-- 作品标题 -->
            <div class="form-group">
                <label class="form-label">作品标题（可选）</label>
                <input type="text" name="title" class="form-input" placeholder="为作品起个名字...">
            </div>

            <!-- 提示词区域 -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    提示词
                </h3>
                <div class="form-group">
                    <label class="form-label">正向提示词 (Positive Prompt)</label>
                    <textarea name="prompt" class="form-input form-textarea" rows="4" placeholder="masterpiece, best quality, highly detailed, 8k, photorealistic..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">负向提示词 (Negative Prompt)</label>
                    <textarea name="negativePrompt" class="form-input form-textarea" rows="3" placeholder="lowres, bad anatomy, bad hands, text, error, watermark..."></textarea>
                </div>
            </div>

            <!-- 核心参数 -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                    核心参数
                </h3>
                <div class="form-group">
                    <label class="form-label">模型 (Model)</label>
                    <input type="text" name="model" class="form-input" placeholder="如: sd_xl_base_1.0.safetensors">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">采样器 (Sampler)</label>
                        <input type="text" name="sampler" class="form-input" placeholder="如: DPM++ 2M Karras">
                    </div>
                    <div class="form-group">
                        <label class="form-label">调度器 (Scheduler)</label>
                        <input type="text" name="scheduler" class="form-input" placeholder="如: normal, karras, exponential">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">步数 (Steps)</label>
                        <input type="number" name="steps" class="form-input" placeholder="如: 30" min="1" max="150">
                    </div>
                    <div class="form-group">
                        <label class="form-label">CFG Scale</label>
                        <input type="number" name="cfgScale" class="form-input" placeholder="如: 7.0" step="0.5" min="1" max="30">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">种子数 (Seed)</label>
                    <input type="text" name="seed" class="form-input" placeholder="如: 1234567890 或 -1（随机）">
                </div>
            </div>

            <!-- 图像设置 -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    图像设置
                </h3>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">宽度 (Width)</label>
                        <input type="number" name="width" class="form-input" placeholder="如: 1024" min="64" max="4096" step="64">
                    </div>
                    <div class="form-group">
                        <label class="form-label">高度 (Height)</label>
                        <input type="number" name="height" class="form-input" placeholder="如: 1024" min="64" max="4096" step="64">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">批次大小 (Batch Size)</label>
                        <input type="number" name="batchSize" class="form-input" placeholder="如: 1" min="1" max="8">
                    </div>
                    <div class="form-group">
                        <label class="form-label">批次数量 (Batch Count)</label>
                        <input type="number" name="batchCount" class="form-input" placeholder="如: 1" min="1" max="100">
                    </div>
                </div>
            </div>

            <!-- 高级设置 -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                    高级设置
                </h3>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">VAE</label>
                        <input type="text" name="vae" class="form-input" placeholder="如: sdxl_vae.safetensors">
                    </div>
                    <div class="form-group">
                        <label class="form-label">CLIP Skip</label>
                        <input type="number" name="clipSkip" class="form-input" placeholder="如: 2" min="1" max="12">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">降噪强度 (Denoising Strength)</label>
                    <input type="number" name="denoisingStrength" class="form-input" placeholder="如: 0.75（用于图生图/高清化）" step="0.01" min="0" max="1">
                </div>
            </div>

            <!-- ControlNet / LoRA -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    扩展模块
                </h3>
                <div class="form-group">
                    <label class="form-label">ControlNet</label>
                    <input type="text" name="controlnet" class="form-input" placeholder="如: control_v11p_sd15_canny">
                </div>
                <div class="form-group">
                    <label class="form-label">IP-Adapter</label>
                    <input type="text" name="ipAdapter" class="form-input" placeholder="如: ip-adapter_sd15">
                </div>
                <div class="form-group">
                    <label class="form-label">LoRA</label>
                    <textarea name="lora" class="form-input form-textarea" rows="2" placeholder="LoRA 模型和权重，如: lora_name: weight (多个用换行分隔)"></textarea>
                </div>
            </div>

            <!-- 其他参数 -->
            <div class="form-group">
                <label class="form-label">其他参数 (JSON 格式)</label>
                <textarea name="other" class="form-input form-textarea" rows="3" placeholder='{"key": "value", ...}'></textarea>
            </div>

            <!-- 提交按钮 -->
            <div class="form-group" style="margin-top: 32px;">
                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; padding: 16px 24px; font-size: 15px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传作品
                </button>
            </div>
        </form>
    </main>

    <!-- 脚本 -->
    <script src="js/config.js"></script>
    <script src="js/r2.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UploadPage.init();
        });
    </script>
</body>
</html>
