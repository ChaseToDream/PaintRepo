<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传作品 - 画仓</title>
    <meta name="description" content="上传 AI 绘图作品">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 密码验证遮罩 -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h2>管理员验证</h2>
            <div class="form-group">
                <label class="form-label">请输入管理密码</label>
                <input 
                    type="password" 
                    id="password-input" 
                    class="form-input" 
                    placeholder="输入密码..."
                    onkeypress="if(event.key === 'Enter') UploadPage.verifyPassword()"
                >
                <p id="auth-error" class="auth-error">密码错误，请重试</p>
            </div>
            <button onclick="UploadPage.verifyPassword()" class="btn btn-primary w-full">
                验证
            </button>
            <div class="auth-links">
                <a href="index.html">返回首页</a>
            </div>
        </div>
    </div>
    
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>画仓</span>
            </a>
            <div class="navbar-actions">
                <a href="index.html" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    返回首页
                </a>
                <button id="theme-toggle" class="theme-toggle" title="切换主题">
                    <span id="theme-icon"></span>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- 上传表单 -->
    <main id="upload-form" class="upload-container" style="display: none;">
        <div class="upload-header">
            <h1>上传作品</h1>
            <p>上传您的 AI 绘图作品，填写生成参数</p>
        </div>
        
        <form id="upload-form-element">
            <!-- 图片上传区域 -->
            <div class="form-group">
                <label class="form-label">图片文件 *</label>
                <div id="upload-area" class="upload-area">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>点击或拖拽图片到此处上传</p>
                    <p class="hint">支持 PNG、JPG、WebP 格式</p>
                </div>
                <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" style="display: none;" required>
                <div id="file-preview" class="file-preview"></div>
                <p id="file-name" class="file-name"></p>
            </div>
            
            <!-- 作品标题 -->
            <div class="form-group">
                <label class="form-label">作品标题（可选）</label>
                <input type="text" name="title" class="form-input" placeholder="为作品起个名字...">
            </div>
            
            <!-- 正向提示词 -->
            <div class="form-group">
                <label class="form-label">正向提示词 (Prompt)</label>
                <textarea name="prompt" class="form-input form-textarea" placeholder="输入正向提示词..."></textarea>
            </div>
            
            <!-- 负向提示词 -->
            <div class="form-group">
                <label class="form-label">负向提示词 (Negative Prompt)</label>
                <textarea name="negativePrompt" class="form-input form-textarea" placeholder="输入负向提示词..."></textarea>
            </div>
            
            <!-- 模型名称 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">模型名称 (Model)</label>
                    <input type="text" name="model" class="form-input" placeholder="如: sd_xl_base_1.0">
                </div>
                <div class="form-group">
                    <label class="form-label">采样器 (Sampler)</label>
                    <input type="text" name="sampler" class="form-input" placeholder="如: DPM++ 2M Karras">
                </div>
            </div>
            
            <!-- 步数和 CFG -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">步数 (Steps)</label>
                    <input type="number" name="steps" class="form-input" placeholder="如: 30" min="1" max="150">
                </div>
                <div class="form-group">
                    <label class="form-label">CFG Scale</label>
                    <input type="number" name="cfgScale" class="form-input" placeholder="如: 7.5" step="0.1" min="1" max="30">
                </div>
            </div>
            
            <!-- 分辨率 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">宽度 (Width)</label>
                    <input type="number" name="width" class="form-input" placeholder="如: 1024" min="64" max="4096" step="64">
                </div>
                <div class="form-group">
                    <label class="form-label">高度 (Height)</label>
                    <input type="number" name="height" class="form-input" placeholder="如: 1024" min="64" max="4096" step="64">
                </div>
            </div>
            
            <!-- 种子数和批次 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">种子数 (Seed)</label>
                    <input type="text" name="seed" class="form-input" placeholder="如: 1234567890">
                </div>
                <div class="form-group">
                    <label class="form-label">批次大小 (Batch Size)</label>
                    <input type="number" name="batchSize" class="form-input" placeholder="如: 1" min="1" max="8">
                </div>
            </div>
            
            <!-- VAE 和 CLIP Skip -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">VAE</label>
                    <input type="text" name="vae" class="form-input" placeholder="如: sdxl_vae.safetensors">
                </div>
                <div class="form-group">
                    <label class="form-label">CLIP Skip</label>
                    <input type="number" name="clipSkip" class="form-input" placeholder="如: 2" min="1" max="12">
                </div>
            </div>
            
            <!-- 去噪强度 -->
            <div class="form-group">
                <label class="form-label">去噪强度 (Denoising Strength)</label>
                <input type="number" name="denoisingStrength" class="form-input" placeholder="如: 0.75" step="0.01" min="0" max="1">
            </div>
            
            <!-- 其他参数 -->
            <div class="form-group">
                <label class="form-label">其他参数</label>
                <textarea name="other" class="form-input form-textarea" placeholder="其他需要记录的参数信息..."></textarea>
            </div>
            
            <!-- 提交按钮 -->
            <div class="form-group" style="margin-top: 32px;">
                <button type="submit" id="submit-btn" class="btn btn-primary w-full" style="padding: 14px 24px; font-size: 15px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传作品
                </button>
            </div>
        </form>
    </main>
    
    <!-- 脚本 -->
    <script src="js/config.js"></script>
    <script src="js/r2.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UploadPage.init();
        });
    </script>
</body>
</html>
