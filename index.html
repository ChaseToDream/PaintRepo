<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画仓 - AI 创作画廊</title>
    <meta name="description" content="画仓 - 专业 AI 绘图作品展示平台，支持 ComfyUI 工作流参数">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>画仓</span>
            </a>
            <div class="navbar-actions">
                <a href="upload.html" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传作品
                </a>
                <button id="theme-toggle" class="theme-toggle" title="切换主题">
                    <span id="theme-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 统计栏 -->
    <div class="stats-bar">
        <div class="stats-inner">
            <div class="stat-item">
                <span class="stat-number" id="total-count">0</span>
                <span class="stat-label">作品</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-number" id="models-count">0</span>
                <span class="stat-label">模型</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-number" id="samplers-count">0</span>
                <span class="stat-label">采样器</span>
            </div>
        </div>
    </div>

    <!-- 瀑布流容器 -->
    <main id="masonry-container" class="masonry-container">
        <!-- 图片卡片将通过 JavaScript 动态加载 -->
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <span id="copyright">© 2026 画仓 · AI 创作画廊</span>
    </footer>

    <!-- 脚本 -->
    <script src="js/config.js"></script>
    <script src="js/r2.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            HomePage.init();
        });
    </script>
</body>
</html>
