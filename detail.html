<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片详情 - 画仓</title>
    <meta name="description" content="AI 绘图作品详情">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold" style="color: var(--text-primary);">
                🎨 画仓
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="btn btn-secondary text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回首页
                </a>
                <button id="theme-toggle" class="theme-toggle" title="切换主题">
                    <span id="theme-icon"></span>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- 主内容 -->
    <main class="pt-20 pb-8 px-4 max-w-5xl mx-auto">
        <!-- 图片展示 -->
        <div id="image-container" class="mb-8 rounded-xl overflow-hidden" style="background-color: var(--bg-secondary);">
            <div class="loading-placeholder" style="min-height: 400px;"></div>
        </div>
        
        <!-- 参数信息 -->
        <div class="mb-6">
            <h2 class="text-lg font-semibold mb-4" style="color: var(--text-primary);">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; vertical-align: middle; margin-right: 8px;">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                生成参数
            </h2>
            <div id="params-container">
                <!-- 参数卡片将通过 JavaScript 动态加载 -->
            </div>
        </div>
    </main>
    
    <!-- 脚本 -->
    <script src="js/config.local.js"></script>
    <script src="js/config.js"></script>
    <script src="js/r2.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 初始化详情页
        document.addEventListener('DOMContentLoaded', () => {
            DetailPage.init();
        });
    </script>
</body>
</html>
